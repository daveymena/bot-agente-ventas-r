version: "3.9"

# Configuración para EasyPanel
# Despliega el Bot de WhatsApp + Hermes AI Agent en el mismo stack

services:
  # ==============================
  # SERVICIO PRINCIPAL: Bot + API
  # ==============================
  ventaflow-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ventaflow-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL}
      # Hermes conectado internamente por nombre de servicio Docker
      - HERMES_URL=http://hermes:5000
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_MODEL=${GITHUB_MODEL:-gpt-4o-mini}
      - AI_FALLBACK_ENABLED=${AI_FALLBACK_ENABLED:-true}
      - AI_FALLBACK_ORDER=${AI_FALLBACK_ORDER:-github,ollama_local}
      - TRANSFER_NUMBER=${TRANSFER_NUMBER}
      - TRANSFER_NAME=${TRANSFER_NAME}
      - MERCADO_PAGO_PUBLIC_KEY=${MERCADO_PAGO_PUBLIC_KEY}
      - MERCADO_PAGO_ACCESS_TOKEN=${MERCADO_PAGO_ACCESS_TOKEN}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET}
      - PAYPAL_MODE=${PAYPAL_MODE:-live}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_TO=${EMAIL_TO}
      - TYPING_DELAY_MIN=${TYPING_DELAY_MIN:-800}
      - TYPING_DELAY_MAX=${TYPING_DELAY_MAX:-2000}
      - READ_RECEIPT_DELAY=${READ_RECEIPT_DELAY:-500}
      - HUMAN_PAUSE_MIN=${HUMAN_PAUSE_MIN:-1000}
      - HUMAN_PAUSE_MAX=${HUMAN_PAUSE_MAX:-3000}
    volumes:
      - ventaflow_data:/app/data
    depends_on:
      - hermes
    networks:
      - ventaflow_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==============================
  # SERVICIO HERMES: Agente IA
  # ==============================
  hermes:
    build:
      context: ./artifacts/hermes-agent
      dockerfile: Dockerfile
    container_name: hermes-agent
    restart: unless-stopped
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_MODEL=${GITHUB_MODEL:-gpt-4o-mini}
    networks:
      - ventaflow_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  ventaflow_data:
    driver: local

networks:
  ventaflow_net:
    driver: bridge
