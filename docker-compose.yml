version: "3.9"

services:
  ventaflow-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ventaflow-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ventaflow_data:/app/data
    depends_on:
      - ventaflow-db

  ventaflow-web:
    image: nginx:alpine
    container_name: ventaflow-web
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./artifacts/whatsapp-bot/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ventaflow-api

  ventaflow-db:
    image: postgres:16-alpine
    container_name: ventaflow-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=ventaflow
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ventaflow_secret}
      - POSTGRES_DB=ventaflow
    ports:
      - "5432:5432"
    volumes:
      - ventaflow_pg:/var/lib/postgresql/data

volumes:
  ventaflow_data:
  ventaflow_pg:
