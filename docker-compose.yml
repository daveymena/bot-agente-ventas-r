version: '3.8'

services:
  # Base de Datos (Persistencia)
  postgres:
    image: postgres:15-alpine
    container_name: tecnovariedades-db
    environment:
      POSTGRES_DB: tecnovariedades
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Cerebro Inteligente: Hermes Agent (Repositorio Oficial)
  hermes:
    build: 
      context: ./artifacts/hermes-agent-official
      dockerfile: Dockerfile.fast
    container_name: hermes-brain
    ports:
      - "5000:5000"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: always

  # Motor de IA Local: Ollama (Corriendo en Easypanel)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-engine
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 12G # Asignamos 12GB para que Ollama vuele con modelos 7B

  # Backend Principal: Daniel (Controlador)
  api:
    build: .
    container_name: daniel-api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://admin:admin123@postgres:5432/tecnovariedades
      - HERMES_URL=http://hermes:5000
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ./artifacts/api-server/.baileys-auth:/.baileys-auth
    depends_on:
      - postgres
      - hermes
    restart: always

volumes:
  pgdata:
  ollama_data:
