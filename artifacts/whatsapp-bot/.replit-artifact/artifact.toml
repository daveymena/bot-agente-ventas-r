kind = "web"
previewPath = "/"
title = "Bot de Ventas WhatsApp + OpenClaw"
version = "1.0.0"
id = "artifacts/whatsapp-bot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20337
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/whatsapp-bot run dev"

[services.env]
PORT = "20337"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/whatsapp-bot", "run", "build"]
publicDir = "artifacts/whatsapp-bot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
